server:
  port: 9997

spring:
  application:
    name: lumi-core-partner-service
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/lumi_partner?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root12345}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:lumi-partner-jwt-secret-key-that-is-at-least-256-bits-long-for-hmac-sha256}
  expiration-ms: ${JWT_EXPIRATION_MS:604800000}  # 1 week (7 days) for non-prod, override in prod

partner:
  admin:
    token: ${PARTNER_ADMIN_TOKEN:ADMIN_20032026}

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 10000
  okhttp:
    enabled: true

api:
  pricing:
    baseUrl: ${PRICING_SERVICE_URL:http://lumi-core-pricing-service.core.svc.cluster.local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]"
